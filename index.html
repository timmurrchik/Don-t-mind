<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customizable Case Opener + Inventory v6</title>
<style>
    :root {
        --primary-color: #ff007f;
        --accent-color: #ff66cc;
        --bg-dark: #120710;
        --bg-panel: #190916;
        --bg-card: rgba(37, 12, 32, 0.9);
        --text-shadow: 0 0 10px var(--accent-color);
        --box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
    }

    body {
        background-color: var(--bg-dark);
        color: #fff;
        font-family: 'Arial', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        margin: 0;
        padding-top: 40px;
        overflow-x: hidden;
        position: relative;
        transition: background-color 0.3s;
    }

    #particles-canvas {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .main-content {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    h1 {
        color: var(--accent-color);
        text-shadow: var(--text-shadow);
        font-size: 24pt;
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
    }

    .balance-container {
        position: fixed;
        top: 15px;
        right: 15px;
        font-size: 14pt;
        background: var(--bg-card);
        padding: 8px 16px;
        border-radius: 15px;
        border: 2px solid var(--primary-color);
        box-shadow: var(--box-shadow);
        z-index: 90;
        cursor: pointer;
        transition: transform 0.2s, border 0.3s, box-shadow 0.3s;
        user-select: none;
    }
    .balance-container:hover { transform: scale(1.05); }
    #balance-value { color: #2ecc71; font-weight: bold; }

    .settings-trigger {
        position: fixed;
        top: 15px;
        left: 15px;
        font-size: 14pt;
        background: var(--bg-card);
        padding: 8px 16px;
        border-radius: 15px;
        border: 2px solid var(--primary-color);
        box-shadow: var(--box-shadow);
        z-index: 90;
        cursor: pointer;
        user-select: none;
        transition: border 0.3s, box-shadow 0.3s;
    }

    .roulette-wrapper {
        position: relative;
        width: 100%;
        max-width: 700px;
        height: 150px;
        background-color: rgba(20, 5, 18, 0.7);
        border: 4px solid var(--accent-color);
        border-radius: 15px;
        box-shadow: var(--box-shadow);
        overflow: hidden;
        margin-bottom: 25px;
        transition: border 0.3s, box-shadow 0.3s;
    }

    .pointer {
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 4px; height: 100%;
        background-color: var(--primary-color);
        box-shadow: 0 0 10px var(--primary-color);
        z-index: 10;
        transition: background-color 0.3s, box-shadow 0.3s;
    }

    .cases-container {
        display: flex;
        position: absolute;
        left: 0; top: 0; height: 100%;
        will-change: transform;
    }

    .item-card {
        flex-shrink: 0;
        width: 130px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        box-sizing: border-box;
        padding: 5px;
    }

    .rarity-common { background: linear-gradient(180deg, rgba(40,40,40,0.4) 0%, rgba(20,20,20,0.8) 100%); border-bottom: 5px solid #8e44ad; } 
    .rarity-rare { background: linear-gradient(180deg, rgba(40,40,60,0.4) 0%, rgba(15,15,30,0.8) 100%); border-bottom: 5px solid #3498db; } 
    .rarity-epic { background: linear-gradient(180deg, rgba(60,40,20,0.4) 0%, rgba(30,15,5,0.8) 100%); border-bottom: 5px solid #e67e22; } 
    .rarity-legendary { background: linear-gradient(180deg, rgba(60,50,10,0.4) 0%, rgba(30,25,0,0.8) 100%); border-bottom: 5px solid #f1c40f; } 

    .item-icon { font-size: 26pt; margin-bottom: 5px; }
    .item-name { font-size: 10pt; font-weight: bold; color: #fff; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    .item-type { font-size: 8pt; color: #aaa; margin-top: 2px; }

    .open-button {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
        color: white; border: none; padding: 15px 40px; font-size: 14pt; font-weight: bold;
        border-radius: 30px; cursor: pointer; box-shadow: var(--box-shadow);
        transition: transform 0.2s, box-shadow 0.3s;
        margin-bottom: 40px;
    }
    .open-button:hover:not(:disabled) { transform: translateY(-2px); }
    .open-button:disabled { background: #333 !important; color: #666; box-shadow: none; cursor: not-allowed; }

    .inventory-section {
        width: 100%;
        max-width: 700px;
        background: var(--bg-panel);
        border-radius: 15px;
        border: 2px solid var(--accent-color);
        padding: 20px;
        box-sizing: border-box;
        margin-bottom: 40px;
        transition: border 0.3s, background-color 0.3s;
    }
    .inventory-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
        margin-bottom: 15px;
    }
    .inventory-title { font-size: 16pt; color: var(--accent-color); font-weight: bold; transition: color 0.3s; }
    .right-controls { display: flex; gap: 10px; align-items: center; }
    .sort-btn, .clear-btn {
        background: rgba(0,0,0,0.4);
        border: 1px solid var(--accent-color);
        color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 9.5pt;
        transition: border 0.3s, background-color 0.2s;
    }
    .sort-btn.active { background: var(--primary-color); border-color: var(--primary-color); }
    .clear-btn:hover { background: #c0392b; border-color: #e74c3c; }
    
    .inventory-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
        gap: 10px;
        min-height: 120px;
    }
    .inv-card {
        height: 120px; border-radius: 8px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
        padding: 5px; box-sizing: border-box; cursor: pointer; transition: transform 0.2s;
    }
    .inv-card:hover { transform: scale(1.05); }
    .inv-card .item-icon { font-size: 20pt; }
    .inv-card .item-name { font-size: 8.5pt; max-width: 95px; overflow: hidden; text-overflow: ellipsis; }

    .modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
    }
    .modal-content {
        background: #15151e;
        padding: 25px; border-radius: 15px; border: 2px solid var(--accent-color);
        box-shadow: var(--box-shadow); text-align: center; max-width: 400px; width: 90%;
        transition: border 0.3s, box-shadow 0.3s;
    }

    .settings-row {
        margin: 15px 0; display: flex; justify-content: space-between; align-items: center; text-align: left;
    }
    .settings-row select, .settings-row input[type="number"] {
        background: #000; border: 1px solid var(--accent-color); color: #fff;
        padding: 6px; border-radius: 5px; width: 145px;
    }
    .btn-action {
        background: var(--primary-color); color: #fff; border: none;
        padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px;
        transition: background-color 0.3s;
    }

    .info-grade {
        display: inline-block; padding: 4px 14px; border-radius: 20px; font-weight: bold; font-size: 9pt; margin: 10px 0;
    }
    .grade-common { background: #8e44ad; color: #fff; }
    .grade-rare { background: #3498db; color: #fff; }
    .grade-epic { background: #e67e22; color: #fff; }
    .grade-legendary { background: #f1c40f; color: #000; }
    .info-desc {
        background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;
        color: #eee; margin: 15px 0; font-size: 11pt; line-height: 1.4; text-align: center;
    }
</style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="main-content">
        <h1 id="main-title">🌸 РОЗОВЫЙ КЕЙС-ОПЕНЕР 🌸</h1>
        
        <div class="settings-trigger" onclick="openSettings()">⚙️ Настройки</div>
        <div class="balance-container" id="balance-box" onclick="handleBalanceClick()">
            💰 <span id="balance-value">52</span> R$
        </div>

        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="cases-container" id="cases-container"></div>
        </div>

        <button class="open-button" id="open-btn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (50 R$)</button>

        <div class="inventory-section">
            <div class="inventory-header">
                <div class="inventory-title" id="inv-title-text">🎒 Твой Инвентарь</div>
                <div class="right-controls">
                    <button class="sort-btn active" id="sort-date-btn" onclick="setSort('date')">По дате</button>
                    <button class="sort-btn" id="sort-rarity-btn" onclick="setSort('rarity')">По редкости</button>
                    <button class="clear-btn" onclick="clearInventory()">🗑️ Очистить</button>
                </div>
            </div>
            <div class="inventory-grid" id="inventory-grid"></div>
        </div>
    </div>

    <!-- НАСТРОЕЧКИ -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--accent-color); font-size:16pt;" id="settings-h3">⚙️ Панель Настроек</h3>
            
            <div class="settings-row">
                <label>Цветовая тема:</label>
                <select id="theme-select" onchange="changeTheme(this.value)">
                    <option value="pink">Розовый неоновый</option>
                    <option value="red">Кроваво-красный</option>
                    <option value="orange">Огненный оранжевый</option>
                    <option value="yellow">Золотой желтый</option>
                    <option value="green">Кислотно-зеленый</option>
                    <option value="blue">Океанский синий</option>
                    <option value="purple">Фиолетовый космос</option>
                    <option value="gray">Стальной серый</option>
                    <option value="white">Чистый белый</option>
                </select>
            </div>

            <div class="settings-row">
                <label>Эффекты частиц:</label>
                <select id="particles-select" onchange="toggleParticles(this.value)">
                    <option value="on">Включены</option>
                    <option value="off">Выключены</option>
                </select>
            </div>

            <div class="settings-row">
                <label>Режим баланса:</label>
                <select id="lock-select" onchange="toggleLockBalance(this.value)">
                    <option value="edit">Можно изменять</option>
                    <option value="locked">Зафиксировать</option>
                </select>
            </div>

            <div class="settings-row" id="admin-balance-row">
                <label>Установить баланс:</label>
                <input type="number" id="custom-balance" value="52">
            </div>
            
            <button class="btn-action" onclick="saveSettings()">Сохранить изменения</button>
        </div>
    </div>

    <!-- КАРТОЧКА ПРЕДМЕТА -->
    <div class="modal-overlay" id="info-modal">
        <div class="modal-content">
            <div id="info-icon" style="font-size: 48pt; margin-bottom: 5px;">🎁</div>
            <h2 id="info-title" style="margin: 5px 0 0 0; font-size: 20pt;">Название предмета</h2>
            <div id="info-grade-badge" class="info-grade grade-rare">RARE</div>
            <div id="info-description" class="info-desc">Описание...</div>
            <button class="btn-action" style="width: 100%; margin: 0;" onclick="closeInfoModal()">Закрыть карточку</button>
        </div>
    </div>

    <!-- ОКНО ВЫИГРЫША -->
    <div class="modal-overlay" id="win-modal">
        <div class="modal-content" style="border-color: #2ecc71;">
            <div style="color: #2ecc71; font-size: 20pt; font-weight: bold; margin-bottom: 15px;">🎉 ТВОЙ ВЫИГРЫШ!</div>
            <div style="padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--accent-color);">
                <div id="win-icon" style="font-size: 38pt;">🎁</div>
                <div id="win-name" style="font-size: 16pt; font-weight: bold; margin-top: 10px;">Приз</div>
                <div id="win-type" style="color: #aaa; font-size: 11pt; margin-top: 5px;">Тип</div>
            </div>
            <button class="btn-action" style="background: #2ecc71; width: 100%; margin:0;" onclick="closeWinModal()">Забрать в инвентарь</button>
        </div>
    </div>

    <script>
        // Обновленный список призов: без бабл-ти, с редкими крупными робуксами и купоном на скин
        const PRIZES = [
            { name: "40 R$", type: "Робуксы", icon: "🪙", rarity: "common", rarityVal: 1, weight: 26, desc: "Обычная пачка робуксов. Мелочь, а приятно! Отложи в копилку." },
            { name: "45 R$", type: "Робуксы", icon: "🪙", rarity: "common", rarityVal: 1, weight: 22, desc: "Почти хватило на открытие нового кейса. Капает прямо на твой счёт." },
            { name: "67 R$", type: "Окупные Робуксы", icon: "💵", rarity: "rare", rarityVal: 2, weight: 14, desc: "Чистый окуп! Потратил 50, забрал 67. Математика вышла в абсолютный плюс." },
            { name: "+1 заказ в Temu", type: "Temu Бонус", icon: "📦", rarity: "common", rarityVal: 1, weight: 14, desc: "Китайские склады пришли в движение! Твоя посылка стала тяжелее на один секретный гаджет." },
            { name: "100 R$", type: "Джекпот Робуксов", icon: "💰", rarity: "epic", rarityVal: 3, weight: 7, desc: "Удвоение баланса с одного прокрута! Цветной градиент принёс тебе солидный куш." },
            { name: "150 R$", type: "Мега Робуксы", icon: "💎", rarity: "epic", rarityVal: 3, weight: 5, desc: "Ничего себе подгон! Целых 150 робуксов летят на твой аккаунт на шоппинг!" },
            { name: "200 R$", type: "Абсолютный Кэш", icon: "👑", rarity: "legendary", rarityVal: 4, weight: 3, desc: "КОРОЛЕВСКИЙ ДЖЕКПОТ! Сорвала банк кейса. Иди покупай лучший скин в каталоге!" },
            { name: "300 R$", type: "Ультра Робуксы", icon: "💎", rarity: "legendary", rarityVal: 4, weight: 1.0, desc: "УЛЬТРА-РЕДКИЙ ДЖЕКПОТ! Целых 300 робуксов! Фортуна сегодня явно на твоей стороне." },
            { name: "400 R$", type: "Гига Кэш", icon: "💸", rarity: "legendary", rarityVal: 4, weight: 0.5, desc: "ГИГАНТСКИЙ КУШ! 400 робуксов одним махом. Твой брат официально банкрот!" },
            { name: "500 R$", type: "Божественные Робуксы", icon: "👑", rarity: "legendary", rarityVal: 4, weight: 0.3, desc: "БОЖЕСТВЕННЫЙ ДЖЕКПОТ КЕЙСА! 500 РОБУКСОВ! Выбить это было практически невозможно, ты сломала эту систему!" },
            { name: "+3 заказа в Temu", type: "Мега Тэму", icon: "🛍️", rarity: "epic", rarityVal: 3, weight: 6, desc: "Целая корзина халявного стаффа летит к тебе домой. Готовь свободное место на столе!" },
            { name: "+6 заказов в Temu", type: "Тэму Про", icon: "🚀", rarity: "legendary", rarityVal: 4, weight: 2, desc: "Шесть секретных посылок уже упакованы! Похоже, тебе везет на крупные коробки." },
            { name: "+7 заказов в Temu", type: "Тэму Космос", icon: "🛸", rarity: "legendary", rarityVal: 4, weight: 1.5, desc: "Космическая доставка активирована! Семь новых заказов оформлены за счет заведения." },
            { name: "+8 заказов в Temu", type: "Тэму Хайп", icon: "⚡", rarity: "legendary", rarityVal: 4, weight: 1.5, desc: "Восемь посылок! Твой курьер PPE Express официально в шоке, готовь тележку для разгрузки." },
            { name: "+9 заказов в Temu", type: "Тэму Оверлорд", icon: "🔥", rarity: "legendary", rarityVal: 4, weight: 1, desc: "Девять заказов! На склад совершен легальный налет. Забирай всё, что видишь!" },
            { name: "+10 заказов в Temu", type: "Эпик Тэму Босс", icon: "🏆", rarity: "legendary", rarityVal: 4, weight: 0.8, desc: "АБСОЛЮТНЫЙ РЕКОРД! 10 заказов в Temu! Ты буквально разорила китайских поставщиков." },
            { name: "Купон на новый скин", type: "Спец-Дроп", icon: "🎟️", rarity: "legendary", rarityVal: 4, weight: 1.2, desc: "Сертификат на бесплатный скин в Roblox! Выбирай любой в каталоге, а брат оплатит." }
        ];

        let balance = parseInt(localStorage.getItem('roblox_case_balance')) || 52;
        let inventory = JSON.parse(localStorage.getItem('roblox_inventory')) || [];
        let currentSort = 'date';
        let isSpinning = false;
        let pendingPrize = null;
        let audioCtx = null;

        let appSettings = JSON.parse(localStorage.getItem('opener_settings')) || {
            theme: 'pink',
            particles: 'on',
            balanceMode: 'edit'
        };

        const ITEM_WIDTH = 130;
        const CONTAINER = document.getElementById('cases-container');
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 6 + 3;
                this.speedY = Math.random() * 0.8 + 0.4;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 1.5 - 0.75;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                
                const currentThemeConfig = THEMES[appSettings.theme] || THEMES.pink;
                ctx.fillStyle = currentThemeConfig.pColor;
                
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 1.6, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < 35; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (appSettings.particles === 'on') {
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
            }
            requestAnimationFrame(animateParticles);
        }

        const THEMES = {
            pink: { primary: "#ff007f", accent: "#ff66cc", dark: "#120710", panel: "#190916", emoji: "🌸", label: "РОЗОВЫЙ", pColor: "rgba(255, 182, 193, 0.4)" },
            red: { primary: "#e74c3c", accent: "#ff6b6b", dark: "#1a0808", panel: "#2c1111", emoji: "🔥", label: "ОГНЕННЫЙ", pColor: "rgba(231, 76, 60, 0.4)" },
            orange: { primary: "#e67e22", accent: "#f39c12", dark: "#1a1105", panel: "#2e1d0b", emoji: "💥", label: "ОРАНЖЕВЫЙ", pColor: "rgba(230, 126, 34, 0.4)" },
            yellow: { primary: "#f1c40f", accent: "#f39c12", dark: "#141303", panel: "#2b2707", emoji: "👑", label: "ЗОЛОТОЙ", pColor: "rgba(241, 196, 15, 0.4)" },
            green: { primary: "#2ecc71", accent: "#27ae60", dark: "#05140b", panel: "#0c2b18", emoji: "🍀", label: "КИСЛОТНЫЙ", pColor: "rgba(46, 204, 113, 0.4)" },
            blue: { primary: "#3498db", accent: "#2980b9", dark: "#05111a", panel: "#0b2236", emoji: "💧", label: "ОКЕАНСКИЙ", pColor: "rgba(52, 152, 219, 0.4)" },
            purple: { primary: "#9b59b6", accent: "#8e44ad", dark: "#0f0514", panel: "#230b30", emoji: "🔮", label: "КОСМИЧЕСКИЙ", pColor: "rgba(155, 89, 182, 0.4)" },
            gray: { primary: "#7f8c8d", accent: "#bdc3c7", dark: "#111111", panel: "#222222", emoji: "⚙️", label: "СТАЛЬНОЙ", pColor: "rgba(127, 140, 141, 0.3)" },
            white: { primary: "#ffffff", accent: "#cccccc", dark: "#1c1c1c", panel: "#333333", emoji: "🪙", label: "БЕЛЫЙ", pColor: "rgba(255, 255, 255, 0.3)" }
        };

        function applyThemeVars(themeName) {
            const t = THEMES[themeName] || THEMES.pink;
            document.documentElement.style.setProperty('--primary-color', t.primary);
            document.documentElement.style.setProperty('--accent-color', t.accent);
            document.documentElement.style.setProperty('--bg-dark', t.dark);
            document.documentElement.style.setProperty('--bg-panel', t.panel);
            document.documentElement.style.setProperty('--bg-card', `rgba(${parseInt(t.panel.slice(1,3),16)||20}, ${parseInt(t.panel.slice(3,5),16)||10}, ${parseInt(t.panel.slice(5,7),16)||15}, 0.85)`);
            
            document.getElementById('main-title').textContent = `${t.emoji} ${t.label} КЕЙС-ОПЕНЕР ${t.emoji}`;
        }

        function updateBalanceUI() {
            document.getElementById('balance-value').textContent = balance;
            document.getElementById('custom-balance').value = balance;
            localStorage.setItem('roblox_case_balance', balance);
            document.getElementById('open-btn').disabled = balance < 50 || isSpinning;
        }

        function handleBalanceClick() {
            if (appSettings.balanceMode === 'edit') openSettings();
        }

        function openSettings() {
            if(isSpinning) return;
            document.getElementById('theme-select').value = appSettings.theme;
            document.getElementById('particles-select').value = appSettings.particles;
            document.getElementById('lock-select').value = appSettings.balanceMode;
            document.getElementById('admin-balance-row').style.display = (appSettings.balanceMode === 'locked') ? 'none' : 'flex';
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function toggleLockBalance(val) {
            document.getElementById('admin-balance-row').style.display = (val === 'locked') ? 'none' : 'flex';
        }

        function saveSettings() {
            appSettings.theme = document.getElementById('theme-select').value;
            appSettings.particles = document.getElementById('particles-select').value;
            appSettings.balanceMode = document.getElementById('lock-select').value;
            
            if (appSettings.balanceMode !== 'locked') {
                let val = parseInt(document.getElementById('custom-balance').value);
                if (!isNaN(val) && val >= 0) balance = val;
            }

            localStorage.setItem('opener_settings', JSON.stringify(appSettings));
            applyThemeVars(appSettings.theme);
            updateBalanceUI();
            document.getElementById('settings-modal').style.display = 'none';
        }

        function changeTheme(val) {
            applyThemeVars(val);
        }

        function clearInventory() {
            if(isSpinning) return;
            if(confirm("Реально хочешь полностью очистить рюкзак? Вернуть лут не получится!")) {
                inventory = [];
                localStorage.setItem('roblox_inventory', JSON.stringify(inventory));
                renderInventory();
            }
        }

        function getRandomPrize() {
            let totalWeight = PRIZES.reduce((sum, p) => sum + p.weight, 0);
            let rand = Math.random() * totalWeight;
            for (let prize of PRIZES) {
                if (rand < prize.weight) return prize;
                rand -= prize.weight;
            }
            return PRIZES[0];
        }

        function createItemNode(prize) {
            const div = document.createElement('div');
            div.className = `item-card rarity-${prize.rarity}`;
            div.innerHTML = `
                <div class="item-icon">${prize.icon}</div>
                <div class="item-name">${prize.name}</div>
                <div class="item-type">${prize.type}</div>
            `;
            return div;
        }

        function playTickSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            } catch(e) {}
        }

        function populateTape() {
            CONTAINER.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                CONTAINER.appendChild(createItemNode(getRandomPrize()));
            }
        }

        function startSpin() {
            if (isSpinning || balance < 50) return;

            balance -= 50;
            updateBalanceUI();
            isSpinning = true;
            populateTape();

            const winIndex = 45;
            pendingPrize = getRandomPrize();
            
            const cards = CONTAINER.getElementsByClassName('item-card');
            const targetCard = cards[winIndex];
            targetCard.className = `item-card rarity-${pendingPrize.rarity}`;
            targetCard.innerHTML = `
                <div class="item-icon">${pendingPrize.icon}</div>
                <div class="item-name">${pendingPrize.name}</div>
                <div class="item-type">${pendingPrize.type}</div>
            `;

            const wrapperWidth = document.querySelector('.roulette-wrapper').offsetWidth;
            const centerOffset = wrapperWidth / 2;
            const innerCardShift = Math.floor(Math.random() * (ITEM_WIDTH - 20)) + 10;
            const targetX = (winIndex * ITEM_WIDTH) + innerCardShift - centerOffset;

            let startTime = null;
            const duration = 4800; 
            let lastTickIndex = 0;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                let elapsed = timestamp - startTime;
                let progress = elapsed / duration;

                if (progress > 1) progress = 1;

                let ease = 1 - Math.pow(1 - progress, 4); 
                let currentX = targetX * ease;

                CONTAINER.style.transform = `translateX(${-currentX}px)`;

                let currentItemIndex = Math.floor((currentX + centerOffset) / ITEM_WIDTH);
                if (currentItemIndex !== lastTickIndex && progress < 0.97) {
                    playTickSound();
                    lastTickIndex = currentItemIndex;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    setTimeout(() => {
                        document.getElementById('win-icon').textContent = pendingPrize.icon;
                        document.getElementById('win-name').textContent = pendingPrize.name;
                        document.getElementById('win-type').textContent = pendingPrize.type;
                        document.getElementById('win-modal').style.display = 'flex';
                    }, 400);
                }
            }
            requestAnimationFrame(animate);
        }

        function closeWinModal() {
            document.getElementById('win-modal').style.display = 'none';
            
            let prizeBonus = 0;
            if (pendingPrize.name === "40 R$") prizeBonus = 40;
            else if (pendingPrize.name === "45 R$") prizeBonus = 45;
            else if (pendingPrize.name === "67 R$") prizeBonus = 67;
            else if (pendingPrize.name === "100 R$") prizeBonus = 100;
            else if (pendingPrize.name === "150 R$") prizeBonus = 150;
            else if (pendingPrize.name === "200 R$") prizeBonus = 200;
            else if (pendingPrize.name === "300 R$") prizeBonus = 300;
            else if (pendingPrize.name === "400 R$") prizeBonus = 400;
            else if (pendingPrize.name === "500 R$") prizeBonus = 500;
            
            balance += prizeBonus;
            
            inventory.push({
                name: pendingPrize.name,
                type: pendingPrize.type,
                icon: pendingPrize.icon,
                rarity: pendingPrize.rarity,
                rarityVal: pendingPrize.rarityVal,
                desc: pendingPrize.desc,
                timestamp: Date.now()
            });
            
            localStorage.setItem('roblox_inventory', JSON.stringify(inventory));
            isSpinning = false;
            updateBalanceUI();
            renderInventory();
        }

        function setSort(type) {
            currentSort = type;
            document.getElementById('sort-date-btn').classList.toggle('active', type === 'date');
            document.getElementById('sort-rarity-btn').classList.toggle('active', type === 'rarity');
            renderInventory();
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            let sortedInv = [...inventory];

            if (currentSort === 'date') {
                sortedInv.sort((a, b) => b.timestamp - a.timestamp);
            } else {
                sortedInv.sort((a, b) => b.rarityVal - a.rarityVal);
            }

            if(sortedInv.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; color: #7f8c8d; text-align: center; padding-top: 40px;">Твой рюкзак пуст... Крутани разок!</div>';
                return;
            }

            sortedInv.forEach((item) => {
                const div = document.createElement('div');
                div.className = `inv-card rarity-${item.rarity}`;
                div.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                `;
                div.onclick = () => showInfoModal(item);
                grid.appendChild(div);
            });
        }

        function showInfoModal(item) {
            document.getElementById('info-icon').textContent = item.icon;
            document.getElementById('info-title').textContent = item.name;
            
            const badge = document.getElementById('info-grade-badge');
            badge.className = `info-grade grade-${item.rarity}`;
            badge.textContent = item.rarity.toUpperCase();

            document.getElementById('info-description').textContent = item.desc || "Описание этого крутого лута загружается.";
            document.getElementById('info-modal').style.display = 'flex';
        }

        function closeInfoModal() {
            document.getElementById('info-modal').style.display = 'none';
        }

        applyThemeVars(appSettings.theme);
        updateBalanceUI();
        populateTape();
        renderInventory();
        initParticles();
        animateParticles();
        CONTAINER.style.transform = `translateX(0px)`;
    </script>
</body>
</html>
